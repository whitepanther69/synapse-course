<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Experience Feedback - Security Programming Tutor</title>
    <link rel="stylesheet" href="/static/style.css?v=20260526_143659">
    <style>
        .feedback-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .rating-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            justify-content: center;
        }
        .rating-btn {
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            min-width: 60px;
            text-align: center;
        }
        .rating-btn:hover {
            border-color: #4facfe;
            background: #f0f9ff;
        }
        .rating-btn.selected {
            border-color: #4facfe;
            background: #4facfe;
            color: white;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
        .submit-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.3);
        }
    </style>
    <link rel="stylesheet" href="/static/butterfly_logo.css">
</head>
<body>
    <div class="container feedback-container">
        <h1>User Experience Feedback</h1>
        <p class="subtitle">Help us improve the Security Programming Tutor</p>
        
        <form id="feedbackForm">
            <div class="form-group">
                <label>Overall Experience Rating:</label>
                <div class="rating-group" data-field="overall">
                    <button type="button" class="rating-btn" data-value="1">😞</button>
                    <button type="button" class="rating-btn" data-value="2">😐</button>
                    <button type="button" class="rating-btn" data-value="3">🙂</button>
                    <button type="button" class="rating-btn" data-value="4">😊</button>
                    <button type="button" class="rating-btn" data-value="5">🤩</button>
                </div>
            </div>

            <div class="form-group">
                <label>AI Teacher Helpfulness (1-5):</label>
                <div class="rating-group" data-field="ai_helpfulness">
                    <button type="button" class="rating-btn" data-value="1">1</button>
                    <button type="button" class="rating-btn" data-value="2">2</button>
                    <button type="button" class="rating-btn" data-value="3">3</button>
                    <button type="button" class="rating-btn" data-value="4">4</button>
                    <button type="button" class="rating-btn" data-value="5">5</button>
                </div>
            </div>

            <div class="form-group">
                <label>Accessibility Features Quality:</label>
                <div class="rating-group" data-field="accessibility">
                    <button type="button" class="rating-btn" data-value="1">Poor</button>
                    <button type="button" class="rating-btn" data-value="2">Fair</button>
                    <button type="button" class="rating-btn" data-value="3">Good</button>
                    <button type="button" class="rating-btn" data-value="4">Great</button>
                    <button type="button" class="rating-btn" data-value="5">Excellent</button>
                </div>
            </div>

            <div class="form-group">
                <label>Your Learning Background:</label>
                <select name="background" required title="Select your programming experience level">
                    <option value="">Select your level</option>
                    <option value="beginner">Complete beginner</option>
                    <option value="some_experience">Some programming experience</option>
                    <option value="intermediate">Intermediate programmer</option>
                    <option value="advanced">Advanced programmer</option>
                    <option value="professional">Professional developer</option>
                </select>
            </div>

            <div class="form-group">
                <label>Which features did you use? (Select all that apply)</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="analyze" id="feat1">
                        <label for="feat1">Code Analysis</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="explain" id="feat2">
                        <label for="feat2">Code Explanation</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="visual" id="feat3">
                        <label for="feat3">Visual Guide</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="security" id="feat4">
                        <label for="feat4">Security Check</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="tests" id="feat5">
                        <label for="feat5">Test Generation</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="accessibility" id="feat6">
                        <label for="feat6">Accessibility Tools</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>What did you find most helpful?</label>
                <textarea name="most_helpful" placeholder="Describe what worked well for your learning..."></textarea>
            </div>

            <div class="form-group">
                <label>What could be improved?</label>
                <textarea name="improvements" placeholder="Suggest specific improvements or report issues..."></textarea>
            </div>

            <div class="form-group">
                <label>Would you recommend this tool to other students?</label>
                <div class="rating-group" data-field="recommend">
                    <button type="button" class="rating-btn" data-value="1">Definitely Not</button>
                    <button type="button" class="rating-btn" data-value="2">Probably Not</button>
                    <button type="button" class="rating-btn" data-value="3">Maybe</button>
                    <button type="button" class="rating-btn" data-value="4">Probably</button>
                    <button type="button" class="rating-btn" data-value="5">Definitely</button>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Feedback</button>
        </form>

        <div class="back-link">
            <a href="/" style="display: inline-flex; align-items: center;"><img src="/icons/butterfly_logo_bright.svg" alt="Home" style="width: 40px; height: 40px; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.1) rotate(-8deg)'" onmouseout="this.style.transform='scale(1)'"></a>
        </div>
    </div>

    <script src="/static/feedback.js"></script>
</body>
</html>
