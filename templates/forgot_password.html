<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Forgot Password — SYNAPSE</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(135deg,#f5f6fa,#eef0ff);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#2c2c3e}
.card{width:100%;max-width:440px;background:#fff;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.08);padding:40px 36px}
h1{margin:0 0 8px;font-size:26px}p{line-height:1.6;color:#555;margin:8px 0}
label{display:block;margin:20px 0 8px;font-weight:600;font-size:14px}
input{width:100%;padding:12px 14px;border:2px solid #e4e6f0;border-radius:10px;font-size:15px;font-family:inherit}
input:focus{outline:none;border-color:#7a5af8}
button{width:100%;margin-top:20px;padding:14px;background:#7a5af8;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
button:hover{background:#6644e6}button:disabled{background:#bcb3f3;cursor:not-allowed}
.alert{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:14px;display:none}
.alert.ok{background:#e8f5e9;color:#2e7d32;border-left:4px solid #2e7d32}
.alert.err{background:#ffebee;color:#c62828;border-left:4px solid #c62828}
.back{text-align:center;margin-top:20px;font-size:14px}
.back a{color:#7a5af8;text-decoration:none;font-weight:600}
</style></head><body>
<div class="card">
<h1>🔐 Forgot your password?</h1>
<p>Enter the email address associated with your account. We will send you a link to reset your password.</p>
<label for="email">Email</label>
<input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
<button id="btn" type="button">Send reset link</button>
<div class="alert ok" id="ok"></div><div class="alert err" id="err"></div>
<div class="back"><a href="/login">← Back to login</a></div>
</div>
<script>
const $=id=>document.getElementById(id);
$('btn').addEventListener('click',async()=>{
  const email=$('email').value.trim();
  if(!email||!email.includes('@')){$('err').textContent='Please enter a valid email address.';$('err').style.display='block';$('ok').style.display='none';return;}
  $('btn').disabled=true;$('btn').textContent='Sending…';$('err').style.display='none';
  try{
    const r=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const d=await r.json();
    $('ok').textContent=d.message||'If an account exists, a link has been sent.';$('ok').style.display='block';
  }catch(e){$('err').textContent='Network error. Please try again.';$('err').style.display='block';}
  $('btn').disabled=false;$('btn').textContent='Send reset link';
});
$('email').addEventListener('keypress',e=>{if(e.key==='Enter')$('btn').click();});
</script></body></html>
