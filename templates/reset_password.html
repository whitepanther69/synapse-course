<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Reset Password — SYNAPSE</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(135deg,#f5f6fa,#eef0ff);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#2c2c3e}
.card{width:100%;max-width:460px;background:#fff;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.08);padding:40px 36px}
h1{margin:0 0 8px;font-size:26px}
p.sub{line-height:1.6;color:#555;margin:8px 0 20px}
label{display:block;margin:16px 0 8px;font-weight:600;font-size:14px}
.pw-wrap{position:relative}
input{width:100%;padding:12px 44px 12px 14px;border:2px solid #e4e6f0;border-radius:10px;font-size:15px;font-family:inherit}
input:focus{outline:none;border-color:#7a5af8}
.toggle-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:4px;width:auto;margin:0;color:#888}
.toggle-eye:hover{color:#7a5af8}
.gen-btn{margin-top:8px;padding:8px 12px;background:#f0ecff;color:#7a5af8;border:1px solid #d4c9fa;border-radius:8px;font-size:13px;cursor:pointer;width:auto;font-weight:500}
.gen-btn:hover{background:#e5dbff}
.strength-bar{height:6px;background:#eee;border-radius:3px;margin-top:8px;overflow:hidden}
.strength-fill{height:100%;width:0%;transition:width .3s,background .3s;background:#e74c3c}
.strength-label{font-size:12px;margin-top:4px;font-weight:600}
.requirements{margin-top:12px;padding:12px;background:#f8f9fd;border-radius:8px;font-size:13px}
.req{display:flex;align-items:center;gap:8px;margin:4px 0;color:#888;transition:color .2s}
.req.ok{color:#2e7d32}
.req-icon{font-size:14px;width:16px}
.match-hint{font-size:13px;margin-top:6px;font-weight:500}
.match-hint.ok{color:#2e7d32}
.match-hint.no{color:#c62828}
button.submit{width:100%;margin-top:20px;padding:14px;background:#7a5af8;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
button.submit:hover{background:#6644e6}
button.submit:disabled{background:#bcb3f3;cursor:not-allowed}
.alert{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:14px;display:none}
.alert.ok{background:#e8f5e9;color:#2e7d32;border-left:4px solid #2e7d32}
.alert.err{background:#ffebee;color:#c62828;border-left:4px solid #c62828}
.back{text-align:center;margin-top:20px;font-size:14px}
.back a{color:#7a5af8;text-decoration:none;font-weight:600}
</style></head><body>
<div class="card">
<h1>🔐 Choose a new password</h1>
<p class="sub">Create a strong password you haven't used before.</p>

<label for="pw">New password</label>
<div class="pw-wrap">
  <input type="password" id="pw" autocomplete="new-password" placeholder="••••••••">
  <button type="button" class="toggle-eye" data-target="pw" aria-label="Show password">👁</button>
</div>
<button type="button" class="gen-btn" id="gen">🎲 Generate secure password</button>

<div class="strength-bar"><div class="strength-fill" id="sfill"></div></div>
<div class="strength-label" id="slabel">&nbsp;</div>

<div class="requirements" id="reqs">
  <div class="req" data-check="length"><span class="req-icon">○</span> At least 8 characters</div>
  <div class="req" data-check="upper"><span class="req-icon">○</span> One uppercase letter (A-Z)</div>
  <div class="req" data-check="lower"><span class="req-icon">○</span> One lowercase letter (a-z)</div>
  <div class="req" data-check="digit"><span class="req-icon">○</span> One digit (0-9)</div>
  <div class="req" data-check="special"><span class="req-icon">○</span> One special character (!@#$%...)</div>
</div>

<label for="pw2">Confirm new password</label>
<div class="pw-wrap">
  <input type="password" id="pw2" autocomplete="new-password" placeholder="••••••••">
  <button type="button" class="toggle-eye" data-target="pw2" aria-label="Show password">👁</button>
</div>
<div class="match-hint" id="match">&nbsp;</div>

<button id="btn" class="submit" type="button" disabled>Update password</button>
<div class="alert ok" id="ok"></div><div class="alert err" id="err"></div>
<div class="back"><a href="/login">← Back to login</a></div>
</div>

<script>
const $=id=>document.getElementById(id);
const token=new URLSearchParams(window.location.search).get("token")||"";
if(!token){
  $("err").textContent="Missing reset token. Please use the link from your email.";
  $("err").style.display="block";$("btn").disabled=true;
}

document.querySelectorAll(".toggle-eye").forEach(b=>{
  b.addEventListener("click",()=>{
    const t=$(b.dataset.target);
    t.type=t.type==="password"?"text":"password";
    b.textContent=t.type==="password"?"👁":"🙈";
  });
});

function checkReqs(pw){
  const r={
    length: pw.length>=8,
    upper: /[A-Z]/.test(pw),
    lower: /[a-z]/.test(pw),
    digit: /\d/.test(pw),
    special: /[!@#$%^&*()_+\-=\[\]{}|;:\'",.<>\/?`~]/.test(pw)
  };
  Object.keys(r).forEach(k=>{
    const el=document.querySelector(`.req[data-check="${k}"]`);
    el.classList.toggle("ok",r[k]);
    el.querySelector(".req-icon").textContent=r[k]?"✅":"○";
  });
  return Object.values(r).every(v=>v);
}

function strength(pw){
  if(!pw) return {score:0,label:"",color:"#e74c3c"};
  let s=0;
  s+=Math.min(pw.length*4,40);
  if(/[A-Z]/.test(pw)) s+=10;
  if(/[a-z]/.test(pw)) s+=10;
  if(/\d/.test(pw)) s+=10;
  if(/[!@#$%^&*()_+\-=\[\]{}|;:\'",.<>\/?`~]/.test(pw)) s+=15;
  if(pw.length>=12) s+=10;
  if(/(.)\1{2,}/.test(pw)) s-=15;
  s=Math.max(0,Math.min(100,s));
  if(s<40) return {score:s,label:"Weak",color:"#e74c3c"};
  if(s<70) return {score:s,label:"Medium",color:"#f39c12"};
  if(s<90) return {score:s,label:"Strong",color:"#2ecc71"};
  return {score:s,label:"Very strong",color:"#27ae60"};
}

function checkMatch(){
  const a=$("pw").value,b=$("pw2").value;
  const m=$("match");
  if(!b){m.textContent="";m.className="match-hint";return false;}
  if(a===b){m.textContent="✓ Passwords match";m.className="match-hint ok";return true;}
  m.textContent="✗ Passwords do not match";m.className="match-hint no";return false;
}

function updateUI(){
  const pw=$("pw").value;
  const reqsOk=checkReqs(pw);
  const s=strength(pw);
  $("sfill").style.width=s.score+"%";
  $("sfill").style.background=s.color;
  $("slabel").textContent=s.label;
  $("slabel").style.color=s.color;
  const matchOk=checkMatch();
  $("btn").disabled=!(reqsOk && matchOk && token);
}

$("pw").addEventListener("input",updateUI);
$("pw2").addEventListener("input",updateUI);

$("gen").addEventListener("click",()=>{
  const up="ABCDEFGHJKLMNPQRSTUVWXYZ";
  const lo="abcdefghjkmnpqrstuvwxyz";
  const dg="23456789";
  const sp="!@#$%^&*_-+=";
  const all=up+lo+dg+sp;
  const rand=(s)=>s[Math.floor(Math.random()*s.length)];
  let pw=[rand(up),rand(lo),rand(dg),rand(sp)];
  for(let i=0;i<12;i++) pw.push(rand(all));
  for(let i=pw.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pw[i],pw[j]]=[pw[j],pw[i]];
  }
  const generated=pw.join("");
  $("pw").value=generated;
  $("pw2").value=generated;
  $("pw").type="text";$("pw2").type="text";
  document.querySelectorAll(".toggle-eye").forEach(b=>b.textContent="🙈");
  updateUI();
});

$("btn").addEventListener("click",async()=>{
  const pw=$("pw").value,pw2=$("pw2").value;
  $("err").style.display="none";$("ok").style.display="none";
  if(pw!==pw2){$("err").textContent="Passwords do not match.";$("err").style.display="block";return;}
  $("btn").disabled=true;$("btn").textContent="Updating…";
  try{
    const r=await fetch("/api/auth/reset-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,password:pw})});
    const d=await r.json();
    if(d.success){
      $("ok").textContent=(d.message||"Password updated")+" Redirecting to login…";
      $("ok").style.display="block";
      setTimeout(()=>location.href="/login",2000);
    }else{
      $("err").textContent=d.message||"Reset failed.";$("err").style.display="block";
      $("btn").disabled=false;$("btn").textContent="Update password";
    }
  }catch(e){
    $("err").textContent="Network error.";$("err").style.display="block";
    $("btn").disabled=false;$("btn").textContent="Update password";
  }
});
</script></body></html>
